<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phishing Detector Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        body { font-family:'Poppins',sans-serif; background:#121212; color:#e0e0e0; margin:0; padding:2rem; }
        a { color:#00aaff; text-decoration:none; }
        .container { max-width:900px; margin:0 auto; }
        .card { background:#1f1f1f; border:1px solid #333; border-radius:12px; padding:1.5rem; }
        .btn { display:inline-block; background:#00aaff; color:#fff; padding:.6rem 1.2rem; border-radius:8px; font-weight:600; border:none; cursor:pointer; }
        .btn:hover { background:#0077cc; }
        input, textarea { width:100%; background:#2a2a2a; color:#e0e0e0; border:1px solid #333; border-radius:8px; padding:.6rem; margin:.4rem 0 1rem; }
        .note { font-size:.95rem; color:#b0b0b0; }
        .back { margin-bottom:1rem; display:inline-block; }
        pre { background:#0e0e0e; padding:1rem; border-radius:8px; overflow:auto; }
    </style>
</head>
<body>
<div class="container">
    <a class="back" href="/">← Back to Dashboard</a>
    <div class="card">
        <h1 style="color:#00aaff; margin:0 0 .5rem 0;">Phishing Detector Tool</h1>
        <p class="note">Submit a URL/text to detect phishing.</p>

        <form id="toolForm">
            <textarea name="input" rows="5" placeholder="Enter input..."></textarea>
            <button class="btn" type="submit">Run</button>
        </form>

        <h3>Result</h3>
        <div id="result" style="background:#0e0e0e; padding:1rem; border-radius:8px; overflow:auto;">—</div>
    </div>
</div>
<script>
document.getElementById('toolForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const input = fd.get('input');
    const resultEl = document.getElementById('result');
    resultEl.innerHTML = 'Running analysis...'; // Update loading message

    try {
        const res = await fetch('/api/phishing-detector', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ input })
        });
        
        const rawData = await res.json();

        // 1. Check if the tool execution itself was successful
        if (!rawData.ok) {
            resultEl.innerHTML = `<span style="color: #f44336;">ERROR: Tool failed to execute. Details: ${rawData.stderr || rawData.error || 'Unknown Error'}</span>`;
            return;
        }

        // 2. Parse the internal JSON string from the stdout field
        let reportData;
        try {
            reportData = JSON.parse(rawData.stdout);
        } catch (parseError) {
            resultEl.innerHTML = `<span style="color: #f44336;">Failed to parse backend response. Raw output:</span><br><pre>${rawData.stdout}</pre>`;
            return;
        }
        
        // Ensure we safely determine the color based on the actual Python risk_level output
        const isHighRisk = reportData.risk_level && reportData.risk_level.toLowerCase().includes('high');
        const statusColor = isHighRisk ? '#f44336' : (reportData.risk_level.includes('Error') ? '#ff9800' : '#4CAF50');

        // 3. Display a well-formatted report perfectly matching the Python backend
        resultEl.innerHTML = `
            <h4 style="margin-top: 0;">Result Status: <span style="color: ${statusColor};">${reportData.risk_level || 'Unknown'}</span></h4>
            <p style="margin: 5px 0;"><strong>Input Analyzed:</strong> ${reportData.input_received || 'N/A'}</p>
            <p style="margin: 5px 0;"><strong>Main Finding:</strong> ${reportData.main_finding || 'N/A'}</p>
            <p style="margin: 5px 0;"><strong>Output:</strong> ${reportData.output || 'N/A'}</p>
            
            <details style="margin-top: 15px;">
                <summary style="cursor: pointer; color: #00aaff;">View Raw System JSON</summary>
                <pre style="background: #1a1a1a; margin-top: 10px;">${JSON.stringify(reportData, null, 2)}</pre>
            </details>
        `;

    } catch (e) {
        resultEl.innerHTML = `<span style="color: #f44336;">A network or parsing error occurred: ${e.message}</span>`;
    }
});
</script>
</body>
</html>
